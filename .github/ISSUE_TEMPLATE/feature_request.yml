name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What beginner or teaching workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Safety scope
      options:
        - label: This can remain project-local and does not require global settings, caches, authentication, or extension state.
          required: true
