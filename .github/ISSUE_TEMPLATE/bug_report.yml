name: Bug report
description: Report incorrect or unsafe vassist behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please remove private paths, settings, tokens, and credentials before submitting.
  - type: input
    id: version
    attributes:
      label: vassist version
      description: Run `vassist --version`.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Ubuntu 24.04, WSL2, Bash 5.2
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: vassist doctor output
      description: Redact private paths if needed.
