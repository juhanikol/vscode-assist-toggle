name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck make

      - name: Bash syntax checks
        run: bash -n install.sh scripts/vscode-mode.sh tests/dependency-checks.sh tests/integration.sh tests/release-checks.sh

      - name: Python syntax check
        run: python3 -c 'import ast, pathlib; ast.parse(pathlib.Path("scripts/settings-patch.py").read_text(encoding="utf-8"))'

      - name: ShellCheck
        run: shellcheck install.sh scripts/*.sh tests/*.sh

      - name: Make checks
        run: make check

      - name: Make tests
        run: make test

      - name: Isolated install, uninstall, and fake-code test
        run: bash tests/integration.sh

      - name: Verify repository workspace settings were not modified
        run: git diff --exit-code -- .vscode/settings.json
